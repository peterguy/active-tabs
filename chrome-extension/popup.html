<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      max-height: 500px;
      background: #1a1a2e;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #a78bfa;
    }

    .current-tab {
      padding: 12px 16px;
      border-bottom: 1px solid #2a2a4a;
    }

    .current-tab .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .current-tab .title {
      font-weight: 500;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .current-tab .url {
      font-size: 11px;
      color: #64748b;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 10px;
    }

    .add-btn {
      width: 100%;
      padding: 8px;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .add-btn:hover {
      background: #6d28d9;
    }

    .add-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }

    .status.success { color: #4ade80; }
    .status.error { color: #f87171; }
    .status.duplicate { color: #fbbf24; }

    .links-section {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .links-header {
      padding: 10px 16px 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
    }

    .search-bar {
      padding: 6px 16px 8px;
    }

    .search-bar input {
      width: 100%;
      padding: 6px 10px;
      background: #2a2a4a;
      border: 1px solid #3a3a5a;
      border-radius: 5px;
      color: #e2e8f0;
      font-size: 12px;
      outline: none;
    }

    .search-bar input:focus {
      border-color: #7c3aed;
    }

    .search-bar input::placeholder {
      color: #64748b;
    }

    .links-list {
      flex: 1;
      overflow-y: auto;
      max-height: 280px;
    }

    .links-list::-webkit-scrollbar {
      width: 4px;
    }

    .links-list::-webkit-scrollbar-thumb {
      background: #3a3a5a;
      border-radius: 2px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      text-decoration: none;
      color: #e2e8f0;
      transition: background 0.1s;
      cursor: pointer;
    }

    .link-item:hover {
      background: #2a2a4a;
    }

    .link-item .favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 2px;
    }

    .link-item .info {
      overflow: hidden;
      flex: 1;
    }

    .link-item .info .name {
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .link-item .info .link-url {
      font-size: 11px;
      color: #64748b;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty {
      padding: 20px 16px;
      text-align: center;
      color: #64748b;
      font-size: 12px;
    }

    .loading {
      padding: 20px 16px;
      text-align: center;
      color: #64748b;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Active Tabs</h1>
  </header>

  <div class="current-tab">
    <div class="label">Current Page</div>
    <div class="title" id="current-title">Loading...</div>
    <div class="url" id="current-url"></div>
    <button class="add-btn" id="add-btn" disabled>Add to Active Tabs</button>
    <div class="status" id="status"></div>
  </div>

  <div class="links-section">
    <div class="links-header">Saved Links</div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search links...">
    </div>
    <div class="links-list" id="links-list">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
